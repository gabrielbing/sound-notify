<svg viewBox="0 0 680 360" width="100%" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
    markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
      stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="340" y="28" text-anchor="middle" font-size="15" font-weight="500" fill="#1a1a1a">sound-notify 工作流程</text>

<!-- Agent Box -->
<g>
  <rect x="40" y="60" width="140" height="56" rx="8" fill="#f5f5f5" stroke="#d0d0d0" stroke-width="0.5"/>
  <text x="110" y="88" text-anchor="middle" font-size="14" font-weight="500" fill="#1a1a1a">AI Agent</text>
  <text x="110" y="108" text-anchor="middle" font-size="12" fill="#888888">WorkBuddy / Claude / Cursor</text>
</g>

<!-- Arrow 1 -->
<polyline points="190,88 210,88" fill="none" stroke="#b0b0b0" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Hook Box -->
<g>
  <rect x="210" y="60" width="140" height="56" rx="8" fill="#f5f5f5" stroke="#d0d0d0" stroke-width="0.5"/>
  <text x="280" y="88" text-anchor="middle" font-size="14" font-weight="500" fill="#1a1a1a">Hook 触发</text>
  <text x="280" y="108" text-anchor="middle" font-size="12" fill="#888888">Stop / PermissionRequest</text>
</g>

<!-- Arrow 2 -->
<polyline points="360,88 380,88" fill="none" stroke="#b0b0b0" stroke-width="1" marker-end="url(#arrow)"/>

<!-- notify.py Box -->
<g>
  <rect x="380" y="60" width="140" height="56" rx="8" fill="#f5f5f5" stroke="#d0d0d0" stroke-width="0.5"/>
  <text x="450" y="88" text-anchor="middle" font-size="14" font-weight="500" fill="#1a1a1a">notify.py</text>
  <text x="450" y="108" text-anchor="middle" font-size="12" fill="#888888">Python 脚本</text>
</g>

<!-- Arrow 3 -->
<polyline points="530,88 550,88" fill="none" stroke="#b0b0b0" stroke-width="1" marker-end="url(#arrow)"/>

<!-- TTS Engine Box -->
<g>
  <rect x="550" y="60" width="100" height="56" rx="8" fill="#f5f5f5" stroke="#d0d0d0" stroke-width="0.5"/>
  <text x="600" y="88" text-anchor="middle" font-size="14" font-weight="500" fill="#1a1a1a">TTS 引擎</text>
  <text x="600" y="108" text-anchor="middle" font-size="12" fill="#888888">Edge TTS / SAPI</text>
</g>

<!-- Arrow down -->
<polyline points="600,120 600,150" fill="none" stroke="#b0b0b0" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Speaker / Sound Box -->
<g>
  <rect x="520" y="155" width="160" height="56" rx="8" fill="#f5f5f5" stroke="#d0d0d0" stroke-width="0.5"/>
  <text x="600" y="183" text-anchor="middle" font-size="14" font-weight="500" fill="#1a1a1a">🔊 播放声音</text>
  <text x="600" y="203" text-anchor="middle" font-size="12" fill="#888888">人声播报提示</text>
</g>

<!-- Bottom: 2 Engine Boxes -->
<g>
  <rect x="120" y="240" width="180" height="56" rx="8" fill="#f0faf5" stroke="#90d0b0" stroke-width="0.5"/>
  <text x="210" y="265" text-anchor="middle" font-size="14" font-weight="500" fill="#1a1a1a">🌐 Edge TTS（在线）</text>
  <text x="210" y="285" text-anchor="middle" font-size="12" fill="#888888">微软神经语音，需联网</text>
</g>

<g>
  <rect x="360" y="240" width="180" height="56" rx="8" fill="#fef5f0" stroke="#f0b090" stroke-width="0.5"/>
  <text x="450" y="265" text-anchor="middle" font-size="14" font-weight="500" fill="#1a1a1a">💻 SAPI（离线）</text>
  <text x="450" y="285" text-anchor="middle" font-size="12" fill="#888888">Windows 内置，零依赖</text>
</g>

<!-- Dashed arrows from TTS Engine to 2 boxes -->
<polyline points="565,135 480,240" fill="none" stroke="#b0b0b0" stroke-width="0.8" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
<polyline points="635,135 540,240" fill="none" stroke="#b0b0b0" stroke-width="0.8" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

<!-- Config note -->
<g>
  <rect x="40" y="320" width="280" height="20" rx="4" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="0.3"/>
  <text x="180" y="333" text-anchor="middle" font-size="11" fill="#888888">config.json 可自定义文案、语音、语速</text>
</g>

</svg>
