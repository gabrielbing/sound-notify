<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; display: flex; justify-content: center; background: #1a1a2e; padding: 40px; }
  .terminal { background: #0d1117; border-radius: 8px; padding: 20px 24px; font-family: 'Cascadia Code', 'Fira Code', monospace; width: 600px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .header { color: #8b949e; font-size: 13px; margin-bottom: 12px; }
  .line { font-size: 14px; margin: 4px 0; }
  .prompt { color: #58a6ff; }
  .cmd { color: #d2a8ff; }
  .arg { color: #79c0ff; }
  .ok { color: #3fb950; }
  .info { color: #8b949e; }
  .speaker { color: #f0883e; font-size: 18px; }
</style>
</head>
<body>
<div class="terminal">
  <div class="header">Windows Terminal — python notify.py</div>
  <div class="line"><span class="prompt">PS C:\Users\Bing&gt; </span><span class="cmd">python</span> <span class="arg">notify.py done --edge</span></div>
  <div class="line" style="margin-top:12px"><span class="speaker">🔊 正在播放：</span></div>
  <div class="line"><span class="info">  「搞定了，任务已完成。」— 云希（温柔男声）</span></div>
  <div class="line" style="margin-top:8px"><span class="ok">✓</span> <span class="info">语音缓存已保存至 ~/.sound-notify/cache/</span></div>
  <div class="line" style="margin-top:16px"><span class="prompt">PS C:\Users\Bing&gt; </span><span class="cmd">python</span> <span class="arg">notify.py --list-voices</span></div>
  <div class="line"><span class="info">  可用语音：云希(男) 云扬(男) 晓晓(女) 晓依(女) ...</span></div>
</div>
</body>
</html>
